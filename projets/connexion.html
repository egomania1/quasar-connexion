<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>

    <!-- quasar css -->
    <link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">
    <div class="row justify-center">
        <div class="col-md-4 col-xs-10 formulaire">

            <q-card>
                <q-card-section>
                    <p class="text-h6">Connexion</p>
                </q-card-section>

                <q-card-section>

                    <!-- champ nom d'utilisateur -->
                    <q-input v-model="utilisateur" label="Nom d'utilisateur" outlined class="q-mb-sm"></q-input>

                    <!-- champ mot de passe -->
                    <q-input v-model="motdepasse" label="Mot de passe" type="password" outlined class="q-mb-md"></q-input>

                    <q-btn label="Valider" color="blue" class="full-width" @click="valider"></q-btn>

                </q-card-section>
            </q-card>

        </div>
    </div>
</div>

<!-- vue et quasar js -->
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.min.js"></script>

<script>

    const app = Vue.createApp({
        data() {
            return {
                utilisateur: '',
                motdepasse: ''
            }
        },
        methods: {
            valider() {

                if (this.utilisateur == '' || this.motdepasse == '') {
                    alert('Remplissez tous les champs')
                    return
                }

                if (this.utilisateur == 'admin' && this.motdepasse == '1234') {
                    alert('Connexion réussie !')
                } else {
                    alert('Identifiants incorrects')
                }
            }
        }
    })

    app.use(Quasar)
    app.mount('#app')

</script>

</body>
</html>
