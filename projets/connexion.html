<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,500|Material+Icons" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.min.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
  <title>Connexion</title>
</head>
<body>

<div id="app">
  <q-layout view="hHh lpR fFf">
    <q-page-container>
      <q-page class="flex flex-center page-fond">
        <div class="carte">

          <q-card>
            <q-card-section class="text-center text-white titre-carte">
              <div>Connexion</div>
            </q-card-section>

            <q-card-section>
              <div class="label-champ">Nom d'utilisateur</div>
              <q-input v-model="nom" outlined dense class="q-mb-md"></q-input>

              <div class="label-champ">Mot de passe</div>
              <q-input v-model="mdp" outlined dense :type="voir ? 'text' : 'password'" class="q-mb-md">
                <template #append>
                  <q-icon :name="voir ? 'visibility_off' : 'visibility'" style="cursor:pointer" @click="voir = !voir"/>
                </template>
              </q-input>

              <div v-if="msg" class="msg-erreur">{{ msg }}</div>

              <q-btn label="Se connecter" class="btn-connexion" @click="connecter"/>
            </q-card-section>
          </q-card>

        </div>
      </q-page>
    </q-page-container>
  </q-layout>
</div>

<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quasar@2/dist/quasar.umd.min.js"></script>
<script src="app.js"></script>

</body>
</html>
